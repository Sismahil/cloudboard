services:
  app:
    build: ./app
    ports:
      - "5000:5000"
    environment:
      APP_NAME: CloudBoard
      APP_GREETING: Welcome to CloudBoard!
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FLASK_PORT: 5000
    depends_on:
      - redis

  redis:
    image: redis:alpine
    command: redis-server --save 60 1 --appendonly yes
    volumes:
      - redis-data:/data

  redis-commander:
    image: rediscommander/redis-commander
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis

volumes:
  redis-data:
